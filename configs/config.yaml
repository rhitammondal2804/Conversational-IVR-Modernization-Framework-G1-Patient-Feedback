# Patient Feedback IVR — Configuration
# Milestone 3: Conversational AI Interface

app:
  name: "City Hospital Patient Feedback IVR"
  version: "1.0.0"
  debug: true
  host: "0.0.0.0"
  port: 5000

ivr:
  max_retries: 3                   # Max failed input attempts before forced exit
  session_timeout_seconds: 300     # Auto-expire sessions after 5 minutes
  empathetic_responses: true       # Prefix responses with sentiment-aware text

ai_engine:
  use_llm: false                   # Set true to enable LLM fallback
  llm_provider: "anthropic"        # "anthropic" or "openai"
  llm_model: "claude-3-haiku-20240307"

storage:
  backend: "json"                  # "json" | "postgres" | "mongodb"
  json_path: "data/feedback_records.json"

hospital:
  name: "City Hospital"
  patient_db: "mock"               # "mock" | "ehr_api"
  ehr_api_url: "https://ehr.cityhospital.example.com/api/patients"
