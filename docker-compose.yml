version: "3.9"

services:
  ivr-app:
    build: .
    container_name: patient-feedback-ivr
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
    volumes:
      - feedback_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  feedback_data:
    driver: local
