<!DOCTYPE html>
<html>
<head>
    <title>City Hospital IVR</title>
    <style>
        body { background:#0d1b2a; color:white; font-family:Arial; display:flex; justify-content:center; margin-top:40px;}
        .phone { background:#1b263b; padding:20px; border-radius:20px; width:350px; }
        .screen { background:#e0fbfc; color:black; height:200px; overflow-y:auto; padding:10px; border-radius:10px; margin-bottom:10px;}
        button { width:70px; height:50px; margin:5px; font-size:18px; border-radius:10px; cursor:pointer;}
    </style>
</head>
<body>

<div class="phone">
<h2>🏥 City Hospital IVR</h2>

<div id="screen" class="screen">Press Start Call</div>

<div>
<button onclick="press('1')">1</button>
<button onclick="press('2')">2</button>
<button onclick="press('3')">3</button><br>
<button onclick="press('4')">4</button>
<button onclick="press('5')">5</button>
<button onclick="press('0')">0</button>
</div>

<br>
<button onclick="startCall()">Start</button>
<button onclick="endCall()">Hang Up</button>
</div>

<script>
const API="http://localhost:8000";
let sessionId=null;
let currentMenu=null;

function display(text){
    const s=document.getElementById("screen");
    s.innerHTML += "<p>"+text+"</p>";
    s.scrollTop=s.scrollHeight;
}

async function startCall(){
    document.getElementById("screen").innerHTML="";
    const res=await fetch(API+"/ivr/start",{method:"POST",headers:{"Content-Type":"application/json"},body:"{}"});
    const data=await res.json();
    sessionId=data.session_id;
    currentMenu=data.menu;
    display(data.prompt);
}

async function press(d){
    if(!sessionId) return;
    display("You pressed: "+d);

    const res=await fetch(API+"/ivr/input",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({session_id:sessionId,digit:d,current_menu:currentMenu})
    });

    const data=await res.json();

    if(data.prompt){
        currentMenu=data.menu;
        display(data.prompt);
    }

    if(data.action==="hangup"){
        display(data.message);
        sessionId=null;
        currentMenu=null;
    }
}

function endCall(){
    display("Call Ended.");
    sessionId=null;
    currentMenu=null;
}
</script>

</body>
</html>
